<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krakowski Detektyw: Certyfikat</title>
    <style>
        :root {
            --bg-color: #0b1325;
            --card-bg: #1c2541;
            --accent-gold: #f4d03f;
            --accent-blue: #00b4d8;
            --text-light: #f8f9fa;
            --text-muted: #95a5a6;
            --success: #2ecc71;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 20% 30%, #1e3a8a 0%, transparent 70%), 
                              radial-gradient(circle at 80% 80%, #0d1b2a 0%, transparent 70%);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        #form-container {
            background: var(--card-bg);
            border: 2px solid rgba(244, 208, 63, 0.2);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        #form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold), var(--accent-blue));
        }

        .cert-form {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .cert-form input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #111a36;
            color: white;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        .menu-btn {
            background: var(--success);
            border: none;
            color: white;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        /* STYL ARKUSZA CERTYFIKATU (A4 Poziomo) */
        #cert-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cert-body {
            width: 297mm;
            height: 210mm;
            background: #fffdf9;
            color: #333;
            box-sizing: border-box;
            padding: 25mm;
            border: 15px double #d4af37;
            outline: 5px solid #1e3d59;
            outline-offset: -20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Georgia', serif;
        }

        .cert-title { font-size: 50px; color: #1e3d59; margin: 0; font-weight: bold; letter-spacing: 2px;}
        .cert-subtitle { font-size: 18px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-top: 5px;}
        .cert-name { font-size: 36px; color: #d4af37; font-weight: bold; margin: 30px 0 15px 0; border-bottom: 2px solid #ddd; min-width: 450px; padding-bottom: 5px; font-family: 'Montserrat', sans-serif;}
        .cert-text { font-size: 18px; line-height: 1.6; max-width: 700px; margin: 10px 0; color: #444;}
        .cert-footer { margin-top: 50px; width: 80%; display: flex; justify-content: space-between; font-size: 14px; color: #555; font-family: 'Montserrat', sans-serif;}
        .cert-sig { border-top: 1px solid #777; width: 180px; padding-top: 8px; text-align: center; }
    </style>
</head>
<body>

    <div id="form-container">
        <div class="cert-form">
            <label for="player-name-input" style="font-weight: bold; color: var(--accent-gold); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Wpisz dane do arkusza:</label>
            <input type="text" id="player-name-input" placeholder="np. Jan Kowalski" oninput="document.getElementById('cert-pdf-name').innerText = this.value || 'Jan Kowalski'">
            <button class="menu-btn" onclick="window.print()">🖨 Drukuj / Zapisz jako PDF</button>
        </div>
    </div>

    <div id="cert-container">
        <div class="cert-body" id="cert-pdf-element">
            <h1 class="cert-title">CERTYFIKAT ODKRYWCY</h1>
            <p class="cert-subtitle">Gry Miejskiej: Krakowski Detektyw</p>
            <br>
            <p class="cert-text">Niniejszym zaświadcza się, że wybitny śledczy</p>
            <div class="cert-name" id="cert-pdf-name">Jan Kowalski</div>
            <p class="cert-text">wykazał się niezwykłą mądrością, spostrzegawczością oraz bezbłędną wiedzą, rozwiązując wszystkie zagadki na mapie tajemnic.</p>
            
            <div class="cert-footer">
                <div class="cert-sig">Data: 2026 r.</div>
                <div class="cert-sig">Główny Inspektor Miasta</div>
            </div>
        </div>
    </div>

</body>
</html>
