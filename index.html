<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Certyfikatów - Grafika jako Szablon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --bg-card: #141b2d;
            --accent-blue: #00b4d8;
            --text-light: #f4f6f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .config-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-blue);
        }

        .input-group input {
            background: #0b101d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00b4d8 0%, #0077b6 100%);
            color: #fff;
        }

        /* Kontener podglądu, w którym na Twoje zdjęcie nakładamy tekst */
        .preview-box {
            position: relative;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
        }

        .preview-box img {
            width: 100%;
            display: block;
        }

        /* Dynamiczny tekst nakładany na zdjęcie w podglądzie */
        .overlay-text {
            position: absolute;
            /* Dopasowano pozycję pionową pod napis na certyfikacie */
            top: 64.5%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 4.2vw; /* Skaluje się proporcjonalnie do zdjęcia */
            color: #0b2265;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="config-card">
            <div class="input-group">
                <label for="name-input">Imię i Nazwisko Śledczego</label>
                <input type="text" id="name-input" placeholder="Wpisz dane..." value="Jan Kowalski">
            </div>
            <button class="btn" id="download-btn">📥 Generuj i Pobierz</button>
        </div>

        <div class="preview-box">
            <img id="cert-image-source" src="image.png" alt="Szablon Certyfikatu">
            <div class="overlay-text" id="name-display">Jan Kowalski</div>
        </div>

    </div>

    <script>
        const nameInput = document.getElementById('name-input');
        const nameDisplay = document.getElementById('name-display');
        const certImageSource = document.getElementById('cert-image-source');
        const downloadBtn = document.getElementById('download-btn');

        // Podgląd w czasie rzeczywistym
        nameInput.addEventListener('input', (e) => {
            nameDisplay.innerText = e.target.value.trim() || 'Jan Kowalski';
        });

        // Generowanie finalnego pliku do pobrania
        downloadBtn.addEventListener('click', () => {
            downloadBtn.innerText = '⌛ Przetwarzanie...';
            downloadBtn.disabled = true;

            const certTemplate = new Image();
            certTemplate.crossOrigin = "anonymous"; 
            certTemplate.src = certImageSource.src;

            certTemplate.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = certTemplate.width;
                canvas.height = certTemplate.height;
                const ctx = canvas.getContext('2d');

                // 1. Rysujemy tło
                ctx.drawImage(certTemplate, 0, 0, canvas.width, canvas.height);

                // 2. Konfigurujemy styl tekstu imienia i nazwiska
                ctx.textAlign = 'center';
                ctx.fillStyle = '#0b2265'; // Kolor dobrany pod resztę napisów
                
                // Proporcjonalny rozmiar czcionki na generowanym pliku
                const fontSize = Math.round(canvas.width * 0.042); 
                ctx.font = `italic bold ${fontSize}px "Playfair Display", Georgia, serif`;

                // 3. Wpisujemy tekst na grafikę
                const xNaZdjeciu = canvas.width / 2; // Środek szerokości
                const yNaZdjeciu = canvas.height * 0.645; // Dopasowanie pionowe do kropkowanej linii
                
                ctx.fillText(nameDisplay.innerText, xNaZdjeciu, yNaZdjeciu);

                // 4. Pobieranie gotowego pliku
                setTimeout(() => {
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `Certyfikat_${nameDisplay.innerText.replace(/\s+/g, '_')}.png`;
                    link.href = dataUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    downloadBtn.innerText = '📥 Generuj i Pobierz';
                    downloadBtn.disabled = false;
                }, 150);
            };

            certTemplate.onerror = function() {
                alert("Błąd: Nie można załadować pliku obrazu szablonu!");
                downloadBtn.innerText = '📥 Generuj i Pobierz';
                downloadBtn.disabled = false;
            };
        });
    </script>
</body>
</html>
